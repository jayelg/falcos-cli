name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 'stable'

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
          GOFLAGS: '-mod=readonly'
        run: |
          version="${GITHUB_REF_NAME#v}"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o goojust .

      - name: Package with checksum
        id: pkg
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="goojust-v${version}-x86_64-linux-gnu.tar.gz"
          # Bundle the binary, runtime helpers, and install script so the
          # falcos image installs everything from one artifact.
          tar -czf "$asset" \
            goojust \
            install.sh \
            scripts/goojust-helpers.sh \
            scripts/falcos-progress
          sha256sum "$asset" | cut -d' ' -f1 > "${asset}.sha256"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "${{ steps.pkg.outputs.asset }}" \
            "${{ steps.pkg.outputs.asset }}.sha256"
